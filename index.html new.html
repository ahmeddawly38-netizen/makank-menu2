<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; }</style>
</head>
<body class="pb-32">

    <header class="bg-black text-white p-6 text-center shadow-lg border-b-4 border-orange-500">
        <h1 class="text-2xl font-bold text-orange-500">مطعم مكانك</h1>
        <p class="text-gray-400 text-sm">أبو صقل، شارع المثلث</p>
    </header>

    <!-- الأصناف مكتوبة مباشرة هنا لتظهر فوراً -->
    <main id="menu" class="p-4 max-w-lg mx-auto">
        <h2 class="text-xl font-bold mb-4 text-orange-600">كريب فراخ</h2>
        
        <div class="bg-white p-3 rounded-xl shadow-sm mb-3 flex items-center gap-3 border">
            <div class="flex-grow">
                <h3 class="font-bold text-sm">كريب بانيه</h3>
                <p class="text-orange-600 font-bold text-sm">65 ج.م</p>
            </div>
            <button onclick="addToCart('كريب بانيه', 65)" class="bg-black text-white px-4 py-2 rounded-lg font-bold">+</button>
        </div>

        <div class="bg-white p-3 rounded-xl shadow-sm mb-3 flex items-center gap-3 border">
            <div class="flex-grow">
                <h3 class="font-bold text-sm">كريب استربس</h3>
                <p class="text-orange-600 font-bold text-sm">80 ج.م</p>
            </div>
            <button onclick="addToCart('كريب استربس', 80)" class="bg-black text-white px-4 py-2 rounded-lg font-bold">+</button>
        </div>
    </main>

    <div id="cart-section" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-2xl z-50 hidden">
        <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold">سلة الطلبات</h3>
            <select id="delivery-type" class="border p-1 rounded text-xs"><option value="pickup">استلام</option><option value="delivery">توصيل (+10)</option></select>
        </div>
        <div id="cart-items" class="text-sm mb-2"></div>
        <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white font-bold py-2 rounded-lg">إرسال الطلب</button>
    </div>

    <script>
        let cart = {};
        function addToCart(n, p) {
            if (!cart[n]) cart[n] = { p, q: 0 };
            cart[n].q++;
            document.getElementById('cart-section').classList.remove('hidden');
            let html = "";
            Object.keys(cart).forEach(n => html += `<p>${n} x${cart[n].q}</p>`);
            document.getElementById('cart-items').innerHTML = html;
        }
        function sendToWhatsApp() {
            let msg = "طلب جديد من مكانك...";
            window.open(`https://wa.me/201021477251?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
