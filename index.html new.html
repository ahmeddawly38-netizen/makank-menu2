<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <style>
        :root { --primary: #ff9900; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; padding-top: 130px; }
        
        /* شريط الأقسام الثابت في الأعلى */
        #nav-tabs { position: fixed; top: 0; width: 100%; background: #fff; display: flex; overflow-x: auto; white-space: nowrap; padding: 10px; border-bottom: 2px solid var(--primary); z-index: 1000; }
        .tab-btn { background: var(--dark); color: white; padding: 10px 20px; margin: 0 5px; border-radius: 20px; cursor: pointer; font-size: 14px; }
        
        .cat-title { background: var(--primary); color: #000; padding: 10px; margin: 20px 10px 5px; font-weight:bold; border-radius: 5px; text-align: center; }
        .item-card { background: #fff; margin: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .item-img { width: 100%; height: 160px; object-fit: cover; border-radius: 15px 15px 0 0; }
        .item-info { padding: 15px; }
        .price-btn { background: var(--primary); color: #000; padding: 10px; border-radius: 8px; margin: 5px; border: none; font-weight:bold; width: 45%; }
    </style>
</head>
<body>

    <!-- شريط الأقسام -->
    <div id="nav-tabs"></div>

    <div id="menu">جاري تحميل المنيو...</div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Ma5vOPN4iU321SfRkkg1KF3vumXnCpdLExw9e_zw764/export?format=csv";
        
        async function loadMenu() {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').filter(r => r.trim() !== "").slice(1);
            
            let html = "";
            let cats = [];
            let currentCat = "";

            rows.forEach((row, idx) => {
                const cols = row.split(',');
                const cat = cols[0], name = cols[1], pMid = cols[2], pBig = cols[3], img = cols[4];
                
                if (!cats.includes(cat)) cats.push(cat);

                if (cat !== currentCat) {
                    html += `<div id="cat-${cat}" class="cat-title">${cat}</div>`;
                    currentCat = cat;
                }
                
                html += `
                    <div class="item-card">
                        ${img ? `<img src="${img}" class="item-img">` : ""}
                        <div class="item-info">
                            <h3>${name}</h3>
                            <button class="price-btn" onclick="addToCart('${name}', ${pMid})">وسط (${pMid})</button>
                            <button class="price-btn" onclick="addToCart('${name}', ${pBig})">كبير (${pBig})</button>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('menu').innerHTML = html;

            // إنشاء أزرار الأقسام
            document.getElementById('nav-tabs').innerHTML = cats.map(cat => 
                `<div class="tab-btn" onclick="document.getElementById('cat-${cat}').scrollIntoView({behavior:'smooth'})">${cat}</div>`
            ).join('');
        }
        loadMenu();
    </script>
</body>
</html>
