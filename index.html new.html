<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مطعم مكانك</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-32">
    <header class="bg-black text-white p-6 text-center border-b-4 border-orange-500">
        <h1 class="text-2xl font-bold text-orange-500">مطعم مكانك</h1>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 border">
            <h3 class="font-bold">كريب بانيه</h3>
            <p class="text-orange-600 font-bold">65 ج.م</p>
            <input type="text" id="note-krep-ban" placeholder="ملاحظة.." class="text-xs border p-1 rounded mt-1 w-full">
            <button onclick="addToCart('كريب بانيه', 65, 'note-krep-ban')" class="w-full bg-black text-white py-2 mt-2 rounded font-bold">+</button>
        </div>
    </main>

    <div id="cart-section" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-2xl z-50 hidden">
        <div id="cart-items" class="text-sm mb-3"></div>
        <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl">إرسال الطلب واتساب 🛒</button>
    </div>

    <script>
        let cart = [];
        let orderCounter = 1;

        function addToCart(n, p, noteId) {
            let note = document.getElementById(noteId).value;
            cart.push({ name: n, price: p, note: note });
            document.getElementById('cart-section').classList.remove('hidden');
            updateUI();
        }

        function updateUI() {
            let html = "الطلبات الحالية:<br>";
            cart.forEach(item => {
                html += `<p class="border-b py-1">• ${item.name} ${item.note ? '(' + item.note + ')' : ''}</p>`;
            });
            document.getElementById('cart-items').innerHTML = html;
        }

                if (item.note) groupedItems[item.name].notes.push(item.note);
