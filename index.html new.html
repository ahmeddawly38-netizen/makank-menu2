<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مطعم مكانك</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding-bottom: 100px; }
        .item-card { background: #fff; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .price-btn { background: #ff9900; color: #000; padding: 8px 15px; border-radius: 5px; margin: 5px; border: none; cursor: pointer; font-weight:bold; }
        header { background: #000; color: #ff9900; text-align: center; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <header>مطعم مكانك</header>
    <div id="menu">جاري تحميل المنيو...</div>

    <script>
        // الرابط المباشر لجدولك
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Ma5vOPN4iU321SfRkkg1KF3vumXnCpdLExw9e_zw764/export?format=csv";

        async function loadMenu() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                let html = "";
                rows.forEach(row => {
                    const [cat, name, priceMid, priceBig] = row.split(',');
                    if(!name) return;
                    
                    html += `
                        <div class="item-card">
                            <h3>${name}</h3>
                            <input type="text" id="note-${name}" placeholder="ملاحظات..">
                            <br>
                            <button class="price-btn" onclick="alert('تمت إضافة ${name} وسط')">وسط (${priceMid} ج.م)</button>
                            <button class="price-btn" onclick="alert('تمت إضافة ${name} كبير')">كبير (${priceBig} ج.م)</button>
                        </div>
                    `;
                });
                document.getElementById('menu').innerHTML = html;
            } catch (err) {
                document.getElementById('menu').innerHTML = "حدث خطأ في تحميل المنيو. تأكد أن الملف مشارك للجميع.";
            }
        }
        loadMenu();
    </script>
</body>
</html>
