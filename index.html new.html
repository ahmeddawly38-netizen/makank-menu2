<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك - المنيو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e60023; --bg: #f8f8f8; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }

        /* شريط الأقسام */
        #nav-tabs { background: #fff; display: flex; padding: 15px; gap: 10px; overflow-x: auto; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { background: #f0f0f0; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; border: none; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* الشبكة (Grid) */
        #menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        
        .item-card { background: white; border-radius: 20px; padding: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; transition: transform 0.2s; }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .item-title { font-weight: bold; font-size: 0.95rem; margin: 5px 0; flex-grow: 1; }
        
        .price-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: #fff; }
        .add-btn { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* شريط سفلي ثابت */
        #bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
    </style>
</head>
<body>

    <div id="nav-tabs"></div>
    <div id="menu-grid"></div>

    <div id="bottom-nav">
        <span>🏠 الرئيسية</span>
        <span>🛒 السلة</span>
        <span style="color:var(--primary)">🍽️ المنيو</span>
        <span>📍 تتبع</span>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Ma5vOPN4iU321SfRkkg1KF3vumXnCpdLExw9e_zw764/export?format=csv";
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];

        async function loadMenu() {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').filter(r => r.trim() !== "").slice(1);
            
            let html = "";
            rows.forEach((row, idx) => {
                const [cat, name, price, , img] = row.split(',');
                html += `
                    <div class="item-card">
                        <img src="${img}" class="item-img" onerror="this.style.display='none'">
                        <div class="item-title">${name}</div>
                        <div class="price-row">
                            <span style="font-weight:bold">${price} ج.م</span>
                            <button class="add-btn" onclick="addToCart('${name}', ${price})">+</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('menu-grid').innerHTML = html;
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            localStorage.setItem('myCart', JSON.stringify(cart));
            alert("تم إضافة " + name + " للسلة!");
        }

        loadMenu();
    </script>
</body>
</html>
