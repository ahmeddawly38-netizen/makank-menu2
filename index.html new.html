<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك - منيو احترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #f4f4f4; }</style>
</head>
<body class="pb-32">

    <header class="bg-black text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold text-orange-500">مطعم مكانك</h1>
        <p class="text-sm text-gray-400">أبو صقل، شارع المثلث</p>
    </header>

    <main id="menu" class="p-4 max-w-lg mx-auto mt-4"></main>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-2xl flex justify-between items-center z-50">
        <div class="font-bold text-lg" id="total-price">الإجمالي: 0 ج.م</div>
        <button onclick="sendToWhatsApp()" class="bg-green-600 text-white font-bold px-6 py-3 rounded-xl shadow-lg hover:bg-green-700">
            أرسل الطلب واتساب
        </button>
    </div>

    <script>
        const menuData = [
            { cat: "كريب فراخ", items: [
                {n: "كريب بانيه", p: 65, d: "قطع بانيه مقرمشة مع جبنة موتزاريلا وصوص خاص", img: "https://img.freepik.com/free-photo/chicken-wrap-with-vegetables_23-2148283307.jpg"},
                {n: "كريب استربس", p: 80, d: "أصابع استربس مقلية مع خضروات طازجة", img: "https://img.freepik.com/free-photo/delicious-chicken-wrap-wooden-table_23-2148283307.jpg"}
            ]}
        ];

        let cart = {};

        function renderMenu() {
            const container = document.getElementById('menu');
            container.innerHTML = menuData.map(section => `
                <h2 class="text-xl font-bold mb-4 mt-6 text-orange-600">${section.cat}</h2>
                ${section.items.map(item => `
                    <div class="bg-white p-3 rounded-2xl shadow-sm mb-3 flex items-center gap-4">
                        <img src="${item.img}" class="w-20 h-20 rounded-xl object-cover">
                        <div class="flex-grow">
                            <h3 class="font-bold">${item.n}</h3>
                            <p class="text-xs text-gray-500">${item.d}</p>
                            <p class="text-orange-600 font-bold mt-1">${item.p} ج.م</p>
                        </div>
                        <button onclick="updateCart('${item.n}', ${item.p}, 1)" class="bg-black text-white px-4 py-2 rounded-lg">+</button>
                    </div>
                `).join('')}
            `).join('');
        }

        function updateCart(name, price, change) {
            if (!cart[name]) cart[name] = { price, qty: 0 };
            cart[name].qty += change;
            if (cart[name].qty <= 0) delete cart[name];
            
            const total = Object.values(cart).reduce((s, i) => s + (i.price * i.qty), 0);
            document.getElementById('total-price').innerText = "الإجمالي: " + total + " ج.م";
        }

        function sendToWhatsApp() {
            let msg = "طلب جديد من مطعم مكانك:%0A";
            Object.keys(cart).forEach(name => { msg += `- ${name} (x${cart[name].qty})%0A`; });
            window.open(`https://wa.me/201021477251?text=${msg}`, '_blank');
        }

        renderMenu();
    </script>
</body>
</html>
