<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #000; color: #ff9900; text-align: center; padding: 20px; font-size: 24px; font-weight: bold; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #ddd; }
        input { width: 90%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; background: #000; color: #fff; padding: 10px; border: none; border-radius: 5px; margin-top: 10px; font-size: 18px; cursor: pointer; }
        #cart-section { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 2px solid #ff9900; box-sizing: border-box; display: none; }
    </style>
</head>
<body>

    <header>مطعم مكانك</header>

    <main>
        <div class="card">
            <h3 style="margin:0">كريب بانيه</h3>
            <p style="color: #ff9900; font-weight: bold;">65 ج.م</p>
            <input type="text" id="note-krep-ban" placeholder="ملاحظة (بدون خضار..)">
            <button onclick="addToCart('كريب بانيه', 65, 'note-krep-ban')">+</button>
        </div>
    </main>

    <div id="cart-section">
        <div id="cart-items" style="margin-bottom: 10px;"></div>
        <button onclick="sendToWhatsApp()" style="background: green;">إرسال الطلب واتساب 🛒</button>
    </div>

    <script>
        let cart = [];
        let orderCounter = 1;

        function addToCart(n, p, noteId) {
            let note = document.getElementById(noteId).value;
            cart.push({ name: n, price: p, note: note });
            document.getElementById('cart-section').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            let html = "<strong>الطلبات:</strong><br>";
            cart.forEach(item => {
                html += `<div style="border-bottom: 1px solid #eee; padding: 5px 0;">• ${item.name} ${item.note ? '('+item.note+')' : ''}</div>`;
            });
            document.getElementById('cart-items').innerHTML = html;
        }

        function sendToWhatsApp() {
            let grouped = {};
            cart.forEach(item => {
                if (!grouped[item.name]) grouped[item.name] = { price: item.price, count: 0, notes: [] };
                grouped[item.name].count++;
                if (item.note) grouped[item.name].notes.push(item.note);
            });

            let msg = `🧾 [ بون أوردر جديد ]%0A🏷️ فاتورة: MK${String(orderCounter).padStart(3, '0')}%0A%0A`;
            let total = 0;
            Object.keys(grouped).forEach(name => {
                let item = grouped[name];
                let itemTotal = item.price * item.count;
                total += itemTotal;
                msg += `▪️ *${name}* (العدد: ${item.count})%0A`;
                item.notes.forEach((n, i) => { msg += `📝 ملاحظة ${i+1}: ${n}%0A`; });
                msg += `السعر: ${item.price} × ${item.count} = ${itemTotal} ج.م%0A%0A`;
            });
            msg += `💰 إجمالي: ${total} ج.م`;

            orderCounter++;
            window.open('https://wa.me/201021477251?text=' + msg, '_blank');
        }
    </script>
</body>
</html>
