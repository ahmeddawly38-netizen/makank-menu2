<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e60023; --bg: #f8f8f8; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        
        .header-logo { width: 100%; height: 200px; object-fit: cover; border-bottom: 5px solid var(--primary); }
        
        #nav-tabs { background: #fff; display: flex; padding: 15px; gap: 10px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { background: #f0f0f0; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; border: 1px solid #eee; }
        
        .category-title { font-weight: bold; font-size: 1.3rem; padding: 20px 15px 5px; color: #333; scroll-margin-top: 80px; }
        
        /* شبكة الأصناف لتكون عمودين (2-Column Grid) بجانب بعضهما */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 10px 15px; }
        .item-card { background: white; border-radius: 20px; padding: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.06); display: flex; flex-direction: column; justify-content: space-between; }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; margin-bottom: 10px; background: #eee; }
        .item-title { font-weight: bold; font-size: 0.95rem; margin: 5px 0; }
        .price-row { display: flex; justify-content: space-between; align-items: center; padding: 5px; margin-top: auto; }
        .add-btn { background: var(--primary); color: white; border: none; width: 35px; height: 35px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }

        #bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; font-weight: bold; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; margin: 20% auto; padding: 20px; width: 85%; border-radius: 20px; }
    </style>
</head>
<body>

    <!-- اللوجو الكبير في الأعلى -->
    <img src="https://j.top4top.io/p_38460ugbt0.jpg" class="header-logo" alt="مطعم مكانك">

    <div id="nav-tabs"></div>
    <div id="menu-container" style="text-align:center; padding:20px;">جاري تحميل جميع الأصناف...</div>

    <!-- الشريط السفلي الثابت -->
    <div id="bottom-nav">
        <span onclick="window.scrollTo({top: 0, behavior: 'smooth'})" style="cursor:pointer;">🏠 الرئيسية</span>
        <span onclick="showModal('cart-modal')" id="cart-count" style="cursor:pointer; color:var(--primary);">🛒 السلة</span>
        <span onclick="showModal('track-modal')" style="cursor:pointer;">📍 تتبع</span>
    </div>

    <!-- نافذة السلة -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center">سلة الطلبات</h2>
            <div id="cart-details"></div>
            <button onclick="sendToWhatsApp()" style="width:100%; background:#25D366; color:white; padding:15px; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">إرسال الطلب</button>
            <button onclick="localStorage.removeItem('myCart'); location.reload();" style="width:100%; background:#ff4757; color:white; padding:10px; border:none; border-radius:10px; margin-top:10px;">مسح السلة</button>
            <button onclick="document.getElementById('cart-modal').style.display='none'" style="width:100%; margin-top:10px; background:#ddd; border:none; padding:10px; border-radius:10px;">إغلاق</button>
        </div>
    </div>

    <!-- نافذة التتبع -->
    <div id="track-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center">تتبع طلبك</h2>
            <input type="text" id="order-id" placeholder="أدخل رقم الطلب أو هاتفك..." style="width:90%; padding:10px; border-radius:10px; border:1px solid #ccc; margin-bottom:10px;">
            <button onclick="trackOrder()" style="width:100%; background:var(--primary); color:white; padding:10px; border:none; border-radius:10px; font-weight:bold;">استعلام</button>
            <button onclick="document.getElementById('track-modal').style.display='none'" style="width:100%; margin-top:10px; background:#ddd; border:none; padding:10px; border-radius:10px;">إغلاق</button>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Ma5vOPN4iU321SfRkkg1KF3vumXnCpdLExw9e_zw764/export?format=csv";
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];

        // دالة ذكية لقراءة ملف الـ CSV وتفادي مشاكل الأسطر الفارغة أو الفواصل داخل النصوص
        function parseCSV(text) {
            let lines = text.split('\n');
            let result = [];
            for (let i = 1; i < lines.length; i++) {
                let row = lines[i].trim();
                if (row === "") continue;
                
                let cols = [];
                let current = '';
                let inQuotes = false;
                
                for (let j = 0; j < row.length; j++) {
                    let char = row[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cols.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                cols.push(current.trim());
                result.cols = cols;
                if (cols[0] && cols[1]) {
                    result.push({
                        cat: cols[0].replace(/^"|"$/g, ''),
                        name: cols[1].replace(/^"|"$/g, ''),
                        price: cols[2] ? cols[2].replace(/^"|"$/g, '') : "0",
                        img: cols[4] ? cols[4].replace(/^"|"$/g, '') : ""
                    });
                }
            }
            return result;
        }

        async function loadMenu() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const items = parseCSV(data);
                
                if (items.length === 0) {
                    document.getElementById('menu-container').innerHTML = "<p style='text-align:center;'>لا توجد أصناف ظاهرة، تأكد من كتابة البيانات في الشيت.</p>";
                    return;
                }

                let categoriesData = {};
                items.forEach(item => {
                    if (!categoriesData[item.cat]) categoriesData[item.cat] = [];
                    categoriesData[item.cat].push(item);
                });

                let html = "", tabsHtml = "";
                for (const cat in categoriesData) {
                    tabsHtml += `<button class="tab-btn" onclick="document.getElementById('cat-${cat}').scrollIntoView({behavior:'smooth'})">${cat}</button>`;
                    html += `<div id="cat-${cat}" class="category-title">${cat}</div><div class="menu-grid">`;
                    
                    categoriesData[cat].forEach(item => {
                        html += `
                            <div class="item-card">
                                <img src="${item.img}" class="item-img" onerror="this.src='https://via.placeholder.com/150'">
                                <div class="item-title">${item.name}</div>
                                <div class="price-row">
                                    <span style="font-weight:bold; color:var(--primary);">${item.price} ج.م</span>
                                    <button class="add-btn" onclick="addToCart('${item.name.replace(/'/g, "")}', '${item.price}')">+</button>
                                </div>
                            </div>`;
                    });
                    html += `</div>`;
                }
                document.getElementById('menu-container').innerHTML = html;
                document.getElementById('nav-tabs').innerHTML = tabsHtml;
            } catch(e) { 
                document.getElementById('menu-container').innerHTML = "حدث خطأ في جلب بيانات المنيو."; 
            }
        }

        function addToCart(name, price) { 
            cart.push({ name, price }); 
            localStorage.setItem('myCart', JSON.stringify(cart)); 
            updateCartCount(); 
        }

        function updateCartCount() {
            document.getElementById('cart-count').innerText = "🛒 السلة (" + cart.length + ")";
        }

        function showModal(id) { 
            if (id === 'cart-modal') {
                let detailsHtml = cart.length === 0 ? "<p style='text-align:center;'>السلة فارغة</p>" : 
                    cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:5px;"><span>${i.name}</span><span style="font-weight:bold; color:var(--primary);">${i.price} ج.م</span></div>`).join('');
                document.getElementById('cart-details').innerHTML = detailsHtml;
            }
            document.getElementById(id).style.display = 'block'; 
        }

        function trackOrder() { 
            let val = document.getElementById('order-id').value; 
            if(val) {
                window.open('https://wa.me/201013740837?text=أريد الاستعلام عن طلب رقم: ' + val, '_blank'); 
            } else {
                alert("يرجى إدخال رقم الطلب أو الهاتف");
            }
        }

        function sendToWhatsApp() { 
            if(cart.length === 0) {
                alert("السلة فارغة!");
                return;
            }
            let total = cart.reduce((sum, item) => sum + parseFloat(item.price || 0), 0);
            let msg = "طلب جديد من المنيو:%0A-------------------%0A" + 
                      cart.map(i => `▪️ ${i.name} - ${i.price} ج.م`).join("%0A") + 
                      `%0A-------------------%0A*الإجمالي: ${total} ج.م*`;
            window.open('https://wa.me/201013740837?text=' + msg, '_blank'); 
        }

        loadMenu();
        updateCartCount();
    </script>
</body>
</html>
