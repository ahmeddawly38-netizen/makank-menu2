<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مطعم مكانك</title>
    <style>
        /* إضافة ستايل خاص للصور */
        .item-img { 
            width: 100%; 
            height: 180px; 
            object-fit: cover; 
            border-radius: 12px 12px 0 0; 
            margin-bottom: 10px; 
        }
        .item-card { 
            background: white; 
            padding: 0; /* شيلنا البادينج عشان الصورة تاخد العرض كامل */
            margin: 15px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            overflow: hidden; /* عشان الصورة ماتطلعش بره الكارت */
        }
        .item-info { padding: 15px; } /* حطينا المعلومات في ديف منفصل */
    </style>
</head>
<body>
    <!-- نفس هيكل الكود السابق، مع استبدال جزء الـ loadMenu بهذا الجزء -->
    <script>
        async function loadMenu() {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').filter(r => r.trim() !== "").slice(1);
            let html = "";
            rows.forEach((row, idx) => {
                const [cat, name, pMid, pBig, imgUrl] = row.split(','); // ضفنا imgUrl
                if (cat !== currentCat) { html += `<div class="cat-title">${cat}</div>`; currentCat = cat; }
                
                html += `
                    <div class="item-card">
                        ${imgUrl ? `<img src="${imgUrl}" class="item-img" alt="${name}">` : ""}
                        <div class="item-info">
                            <h3 style="margin:0 0 10px 0;">${name}</h3>
                            <input type="text" id="note-${idx}" placeholder="ملاحظات..">
                            <br>
                            <button class="price-btn" onclick="addToCart('${name}', ${pMid}, 'وسط', 'note-${idx}')">وسط (${pMid} ج.م)</button>
                            <button class="price-btn" onclick="addToCart('${name}', ${pBig}, 'كبير', 'note-${idx}')">كبير (${pBig} ج.م)</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('menu').innerHTML = html;
        }
    </script>
</body>
</html>
