<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #f4f4f4; }</style>
</head>
<body class="pb-32">

    <!-- الهيدر -->
    <header class="bg-black text-white p-6 text-center shadow-lg border-b-4 border-orange-500">
        <img src="https://via.placeholder.com/100" alt="لوجو" class="w-24 h-24 mx-auto mb-2 rounded-full border-2 border-orange-500 bg-white">
        <h1 class="text-2xl font-bold text-orange-500">مطعم مكانك</h1>
    </header>

    <main id="menu" class="p-4 max-w-lg mx-auto">
        <h2 class="text-xl font-bold mb-4 text-orange-600">المنيو</h2>
        <!-- يمكنك تكرار هذه الكتلة لكل صنف -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 border flex justify-between items-center">
            <div><h3 class="font-bold">كريب بانيه</h3><p class="text-orange-600 font-bold">65 ج.م</p>
            <input type="text" id="note-krep-ban" placeholder="ملاحظات.." class="text-xs border p-1 rounded mt-1 w-full"></div>
            <button onclick="addToCart('كريب بانيه', 65, 'note-krep-ban')" class="bg-black text-white px-6 py-2 rounded-lg font-bold">+</button>
        </div>
    </main>

    <!-- السلة -->
    <div id="cart-section" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-2xl z-50 hidden">
        <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold">سلة الطلبات</h3>
            <select id="delivery-type" class="border p-2 rounded text-xs" onchange="updateUI()">
                <option value="pickup">استلام من المطعم</option>
                <option value="delivery">توصيل (+10 ج.م)</option>
            </select>
        </div>
        <div id="cart-items" class="text-sm mb-3"></div>
        <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl shadow-lg">إرسال بون الطلب واتساب 🛒</button>
    </div>

    <script>
        let cart = {};
        function addToCart(n, p, noteId) {
            let note = document.getElementById(noteId).value;
            if (!cart[n]) cart[n] = { p: p, q: 0, note: note };
            cart[n].q++;
            document.getElementById('cart-section').classList.remove('hidden');
            updateUI();
        }

        function updateUI() {
            let html = "", total = 0;
            Object.keys(cart).forEach(n => {
                total += (cart[n].p * cart[n].q);
                html += `<p>• ${n} (x${cart[n].q})</p>`;
            });
            document.getElementById('cart-items').innerHTML = html;
        }

        function sendToWhatsApp() {
            const orderID = "MK-" + Math.floor(1000 + Math.random() * 9000);
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            let msg = `🧾 [ بون أوردر جديد - مطعم مكانك ]%0A%0A🏷️ رقم الفاتورة: ${orderID}%0A⏰ وقت الطلب: ${time}%0A%0A`;
            msg += `📦 طريقة الاستلام: ${document.getElementById('delivery-type').options[document.getElementById('delivery-type').selectedIndex].text}%0A---------------------------%0A🛒 الوجبات المطلوبة:%0A%0A`;
            
            let total = 0;
            Object.keys(cart).forEach(n => {
                let itemTotal = cart[n].p * cart[n].q;
                total += itemTotal;
                msg += `▪️ *${n}*%0Aالعدد: ${cart[n].q} -> (${cart[n].p} ج.م × ${cart[n].q} = ${itemTotal} ج.م)%0A${cart[n].note ? '📝 ملاحظة: '+cart[n].note+'%0A' : ''}%0A`;
            });
            
            total += (document.getElementById('delivery-type').value === 'delivery' ? 10 : 0);
            msg += `---------------------------%0A💰 إجمالي المطلوب دفعه: ${total} ج.م`;
            
            window.open(`https://wa.me/201021477251?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
