<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك - أطيب المأكولات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; }</style>
</head>
<body>

    <header class="bg-black text-white p-8 text-center shadow-xl">
        <h1 class="text-4xl font-bold text-orange-500">مطعم مكانك</h1>
        <p class="mt-2 text-gray-300">أبو صقل، شارع المثلث بجوار سوبر ماركت الدولي</p>
    </header>

    <main id="menu" class="p-4 max-w-2xl mx-auto mb-24"></main>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t border-gray-200 shadow-[0_-4px_15px_rgba(0,0,0,0.1)] flex justify-between items-center z-50">
        <span id="total-price" class="font-bold text-lg">الإجمالي: 0 ج.م</span>
        <button onclick="sendToWhatsApp()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-8 py-3 rounded-full transition-all shadow-lg">
            إتمام الطلب (واتساب)
        </button>
    </div>

    <script>
        const menuData = [
            { cat: "كريب فراخ", items: [{n: "كريب بطاطس", p: 60}, {n: "كريب بانيه", p: 65}, {n: "كريب استربس", p: 80}, {n: "كريب شيش طاووق", p: 100}, {n: "كريب مشكل فراخ", p: 100}] },
            { cat: "كريب لحوم", items: [{n: "كريب برجر", p: 80}, {n: "كريب هوت دوج", p: 80}, {n: "كريب مشكل لحوم", p: 100}] },
            { cat: "فطيرة بطاطس", items: [{n: "بطاطس", p: 15}, {n: "بطاطس موتزاريلا", p: 25}, {n: "بطاطس رومي", p: 25}, {n: "بطاطس ميكس جبن", p: 30}] }
        ];

        let cart = [];

        function renderMenu() {
            const container = document.getElementById('menu');
            container.innerHTML = menuData.map(section => `
                <div class="mb-8">
                    <h2 class="text-2xl font-bold mb-4 text-gray-800 border-r-4 border-orange-500 pr-3">${section.cat}</h2>
                    <div class="grid gap-3">
                        ${section.items.map(item => `
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center hover:shadow-md transition">
                                <div>
                                    <h3 class="font-bold text-lg">${item.n}</h3>
                                    <p class="text-orange-600 font-bold">${item.p} ج.م</p>
                                </div>
                                <button onclick="addToCart('${item.n}', ${item.p})" class="bg-black text-white w-10 h-10 rounded-full flex items-center justify-center text-xl font-bold">+</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateTotal();
            alert("تمت إضافة " + name);
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = "الإجمالي: " + total + " ج.م";
        }

        function sendToWhatsApp() {
            if(cart.length === 0) { alert("السلة فارغة!"); return; }
            let msg = "طلب جديد من مطعم مكانك:%0A";
            cart.forEach(i => { msg += `- ${i.name}: ${i.price} ج.م%0A`; });
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            msg += `%0Aالإجمالي: ${total} ج.م%0A%0Aالاسم والعنوان:`;
            window.open(`https://wa.me/201021477251?text=${msg}`, '_blank');
        }

        renderMenu();
    </script>
</body>
</html>
