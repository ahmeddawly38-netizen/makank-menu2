<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding-bottom: 120px; }
        header { background: #000; color: #ff9900; text-align: center; padding: 20px; font-weight: bold; font-size: 20px; }
        .cat-title { background: #ff9900; color: #000; padding: 10px; margin: 20px 10px 5px; font-weight:bold; border-radius: 5px; text-align: center; }
        .item-card { background: #fff; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #ddd; }
        .price-btn { background: #ff9900; color: #000; padding: 8px 15px; border-radius: 5px; margin: 5px; border: none; cursor: pointer; font-weight:bold; width: 45%; }
        #toast { display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; z-index:3000; }
        #floating-cart { position: fixed; bottom: 20px; right: 20px; left: 20px; background: #000; color: #fff; padding: 15px; border-radius: 50px; text-align: center; font-weight: bold; cursor: pointer; z-index: 1000; }
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 85%; border-radius: 15px; }
    </style>
</head>
<body>

    <header>مطعم مكانك</header>
    <div id="toast">تمت الإضافة للسلة! ✅</div>
    <div id="menu">جاري تحميل المنيو...</div>
    
    <div id="floating-cart" onclick="showModal()">🛒 عرض الطلبات (0)</div>

    <div id="cart-modal">
        <div class="modal-content">
            <h2 style="text-align:center">سلة الطلبات</h2>
            <div id="cart-details"></div>
            <button onclick="sendToWhatsApp()" style="width:100%; background:green; color:white; padding:12px; border:none; border-radius:8px;">إرسال الأوردر واتساب 🚚</button>
            <button onclick="hideModal()" style="width:100%; background:#ccc; margin-top:10px; border:none; padding:10px; border-radius:8px;">إغلاق</button>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Ma5vOPN4iU321SfRkkg1KF3vumXnCpdLExw9e_zw764/export?format=csv";
        let cart = [];
        let currentCat = "";

        async function loadMenu() {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            let html = "";
            
            rows.forEach((row, idx) => {
                const [cat, name, priceMid, priceBig] = row.split(',');
                if(!name) return;
                
                if (cat !== currentCat) {
                    html += `<div class="cat-title">${cat}</div>`;
                    currentCat = cat;
                }
                
                html += `
                    <div class="item-card">
                        <h3>${name}</h3>
                        <input type="text" id="note-${idx}" placeholder="ملاحظات..">
                        <br>
                        <button class="price-btn" onclick="addToCart('${name}', ${priceMid}, 'وسط', 'note-${idx}')">وسط (${priceMid} ج.م)</button>
                        <button class="price-btn" onclick="addToCart('${name}', ${priceBig}, 'كبير', 'note-${idx}')">كبير (${priceBig} ج.م)</button>
                    </div>
                `;
            });
            document.getElementById('menu').innerHTML = html;
        }

        function addToCart(name, price, size, noteId) {
            let note = document.getElementById(noteId).value;
            cart.push({ name: `${name} (${size})`, price, note });
            updateFloatingBtn();
            let toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function updateFloatingBtn() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('floating-cart').innerText = `🛒 عرض الطلبات (${cart.length}) - ${total} ج.م`;
        }

        function showModal() {
            document.getElementById('cart-details').innerHTML = cart.map((i, idx) => `<p>${idx+1}. ${i.name} ${i.note ? '('+i.note+')' : ''} - ${i.price} ج.م</p>`).join('') || "السلة فارغة";
            document.getElementById('cart-modal').style.display = 'block';
        }

        function hideModal() { document.getElementById('cart-modal').style.display = 'none'; }

        function sendToWhatsApp() {
            let msg = "طلب جديد:%0A" + cart.map(i => `* ${i.name} - ${i.price} ج.م ${i.note ? '('+i.note+')' : ''}`).join('%0A');
            window.open('https://wa.me/201013740837?text=' + msg, '_blank');
        }

        loadMenu();
    </script>
</body>
</html>
