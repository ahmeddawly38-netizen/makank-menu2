<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك - المنيو</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; }</style>
</head>
<body class="pb-32">

    <header class="bg-black text-white p-6 text-center shadow-lg border-b-4 border-orange-500">
        <img src="https://via.placeholder.com/100" alt="لوجو مطعم مكانك" class="w-24 h-24 mx-auto mb-2 rounded-full border-2 border-orange-500 bg-white">
        <h1 class="text-2xl font-bold text-orange-500">مطعم مكانك</h1>
        <p class="text-gray-400 text-sm">أبو صقل، شارع المثلث</p>
    </header>

    <main id="menu" class="p-4 max-w-lg mx-auto"></main>

    <div id="cart-section" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-[0_-4px_20px_rgba(0,0,0,0.1)] z-50 hidden">
        <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-lg">سلة الطلبات</h3>
            <select id="delivery-type" class="border p-2 rounded-lg text-xs bg-gray-50" onchange="updateUI()">
                <option value="pickup">استلام من المطعم</option>
                <option value="delivery">توصيل (+10 ج.م)</option>
            </select>
        </div>
        <div id="cart-items" class="text-sm max-h-32 overflow-y-auto mb-2 pr-2"></div>
        <div class="flex justify-between items-center border-t pt-2">
            <span class="font-bold text-lg text-orange-600" id="total-price">الإجمالي: 0 ج.م</span>
            <button onclick="sendToWhatsApp()" class="bg-green-600 text-white font-bold px-5 py-2 rounded-xl text-sm shadow-lg">إرسال الطلب واتساب 🛒</button>
        </div>
    </div>

    <script>
        const menuData = [
            { cat: "كريب فراخ", items: [
                {n: "كريب بانيه", p: 65, img: "https://via.placeholder.com/150"},
                {n: "كريب استربس", p: 80, img: "https://via.placeholder.com/150"}
            ]}
        ];

        let cart = {};

        function renderMenu() {
            const container = document.getElementById('menu');
            container.innerHTML = menuData.map(section => `
                <h2 class="text-lg font-bold mb-3 text-gray-700 border-r-4 border-orange-500 pr-2">${section.cat}</h2>
                ${section.items.map(item => `
                    <div class="bg-white p-3 rounded-xl shadow-sm mb-3 flex items-center gap-3 border">
                        <img src="${item.img}" class="w-16 h-16 rounded-lg object-cover">
                        <div class="flex-grow">
                            <h3 class="font-bold text-sm">${item.n}</h3>
                            <p class="text-orange-600 font-bold text-sm">${item.p} ج.م</p>
                            <input type="text" id="note-${item.n.replace(/\s+/g, '-')}" placeholder="ملاحظات.." class="text-[10px] border rounded w-full mt-1 p-1">
                        </div>
                        <button onclick="addToCart('${item.n}', ${item.p})" class="bg-black text-white px-4 py-2 rounded-lg font-bold">+</button>
                    </div>
                `).join('')}
            `).join('');
        }

        function addToCart(n, p) {
            const noteInput = document.getElementById('note-'+n.replace(/\s+/g, '-'));
            if (!cart[n]) cart[n] = { p, q: 0, note: noteInput.value };
            cart[n].q++;
            cart[n].note = noteInput.value;
            document.getElementById('cart-section').classList.remove('hidden');
            updateUI();
        }

        function updateUI() {
            let total = 0;
            let cartHtml = "";
            Object.keys(cart).forEach(n => {
                total += (cart[n].p * cart[n].q);
                cartHtml += `<p class="mb-1">✅ ${n} x${cart[n].q} - ${cart[n].p * cart[n].q} ج.م</p>`;
            });

            const delivery = document.getElementById('delivery-type').value === 'delivery' ? 10 : 0;
            document.getElementById('total-price').innerText = "الإجمالي: " + (total + delivery) + " ج.م";
