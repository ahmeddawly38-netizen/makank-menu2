<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; padding-bottom: 120px; }
        header { background: #000; color: #ff9900; text-align: center; padding: 20px; font-weight: bold; font-size: 22px; }
        .cat-title { background: #ff9900; color: #000; padding: 10px; margin: 20px 10px 5px; font-weight:bold; border-radius: 5px; text-align: center; }
        .item-card { background: #fff; padding: 15px; margin: 10px; border-radius: 12px; border: 1px solid #ddd; }
        .price-btn { background: #ff9900; color: #000; padding: 10px; border-radius: 8px; margin: 5px; border: none; cursor: pointer; font-weight:bold; width: 45%; }
        #toast { display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:12px 25px; border-radius:30px; z-index:9999; }
        #floating-cart { position: fixed; bottom: 20px; right: 20px; left: 20px; background: #000; color: #fff; padding: 15px; border-radius: 50px; text-align: center; font-weight: bold; cursor: pointer; z-index: 1000; }
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 85%; border-radius: 15px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

    <header>مطعم مكانك</header>
    <div id="toast">تمت الإضافة للسلة! ✅</div>
    <div id="menu">جاري تحميل المنيو...</div>
    <div id="floating-cart" onclick="showModal()">🛒 عرض الطلبات (0)</div>

    <div id="cart-modal">
        <div class="modal-content">
            <h2 style="text-align:center">سلة الطلبات</h2>
            <div id="cart-details"></div>
            <input type="text" id="cust-name" placeholder="اسم العميل...">
            <input type="text" id="cust-address" placeholder="عنوان التوصيل...">
            <p id="total-price" style="font-weight:bold; text-align:center;"></p>
            <button onclick="sendToWhatsApp()" style="width:100%; background:green; color:white; padding:15px; border:none; border-radius:10px;">إرسال الأوردر واتساب 🚚</button>
            <button onclick="clearCart()" style="width:100%; background:#ff4444; color:white; margin-top:10px; border:none; padding:10px; border-radius:8px;">مسح السلة</button>
            <button onclick="hideModal()" style="width:100%; background:#ccc; margin-top:10px; border:none; padding:10px; border-radius:8px;">إغلاق</button>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Ma5vOPN4iU321SfRkkg1KF3vumXnCpdLExw9e_zw764/export?format=csv";
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        let currentCat = "";

        updateFloatingBtn();

        async function loadMenu() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').filter(row => row.trim() !== "").slice(1);
                let html = "";
                rows.forEach((row, idx) => {
                    const columns = row.split(',');
                    const cat = columns[0];
                    const name = columns[1];
                    const priceMid = columns[2];
                    const priceBig = columns[3];
                    if(!name) return;
                    if (cat !== currentCat) {
                        html += `<div class="cat-title">${cat}</div>`;
                        currentCat = cat;
                    }
                    html += `
                        <div class="item-card">
                            <h3 style="margin:0 0 10px 0;">${name}</h3>
                            <input type="text" id="note-${idx}" placeholder="ملاحظات..">
                            <br>
                            <button class="price-btn" onclick="addToCart('${name}', ${priceMid}, 'وسط', 'note-${idx}')">وسط (${priceMid} ج.م)</button>
                            <button class="price-btn" onclick="addToCart('${name}', ${priceBig}, 'كبير', 'note-${idx}')">كبير (${priceBig} ج.م)</button>
                        </div>
                    `;
                });
                document.getElementById('menu').innerHTML = html;
            } catch (err) { document.getElementById('menu').innerHTML = "خطأ في التحميل."; }
        }

        function addToCart(name, price, size, noteId) {
            let note = document.getElementById(noteId).value;
            let itemName = `${name} (${size})`;
            let existingItem = cart.find(item => item.name === itemName && item.note === note);
            if (existingItem) { existingItem.qty += 1; } 
            else { cart.push({ name: itemName, price: price, note: note, qty: 1 }); }
            localStorage.setItem('myCart', JSON.stringify(cart));
            updateFloatingBtn();
            let toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function clearCart() { cart = []; localStorage.setItem('myCart', JSON.stringify(cart)); updateFloatingBtn(); showModal(); }
        
        function updateFloatingBtn() {
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('floating-cart').innerText = `🛒 عرض الطلبات (${count}) - ${total} ج.م`;
        }

        function showModal() {
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('cart-details').innerHTML = cart.map((i, idx) => 
                `<p style="border-bottom:1px solid #eee; padding:5px;">${idx+1}. ${i.name} (x${i.qty}) ${i.note ? '['+i.note+']' : ''} - ${i.price * i.qty} ج.م</p>`
            ).join('') || "السلة فارغة";
            document.getElementById('total-price').innerText = cart.length > 0 ? "الإجمالي: " + total + " ج.م" : "";
            document.getElementById('cart-modal').style.display = 'block';
        }

        function hideModal() { document.getElementById('cart-modal').style.display = 'none'; }

        function sendToWhatsApp() {
            let name = document.getElementById('cust-name').value;
            let addr = document.getElementById('cust-address').value;
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            // توليد رقم أوردر عشوائي بسيط أو متسلسل
            let orderId = "Mk" + Math.floor(Math.random() * 900 + 100); 
            
            let now = new Date();
            let dateStr = now.toLocaleDateString('ar-EG');
            let timeStr = now.toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});

            let msg = `🍔 *طلب جديد من مطعم مكانك*%0A`;
            msg += `🆔 رقم الطلب: ${orderId}%0A`;
            msg += `--------------------------%0A`;
            msg += `👤 العميل: ${name || "غير محدد"}%0A`;
            msg += `📍 العنوان: ${addr || "غير محدد"}%0A`;
            msg += `📅 التاريخ: ${dateStr}%0A`;
            msg += `⏰ الوقت: ${timeStr}%0A`;
            msg += `--------------------------%0A%0A`;
            
            msg += cart.map(i => `✅ *${i.name}*%0A   الكمية: ${i.qty} | الحساب: ${i.price} × ${i.qty} = ${i.price * i.qty} ج.م ${i.note ? '%0A   📝 ملاحظة: ' + i.note : ''}`).join('%0A%0A');
            
            msg += `%0A%0A--------------------------%0A`;
            msg += `💰 *إجمالي الحساب: ${total} ج.م*`;
            msg += `%0A--------------------------`;

            window.open('https://wa.me/201013740837?text=' + msg, '_blank');
        }
        loadMenu();
    </script>
</body>
</html>
