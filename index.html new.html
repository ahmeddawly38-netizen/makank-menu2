<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-32">

    <header class="bg-black text-white p-6 text-center shadow-lg border-b-4 border-orange-500">
        <h1 class="text-2xl font-bold text-orange-500">مطعم مكانك</h1>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <h2 class="text-xl font-bold mb-4 text-orange-600">قائمة الطعام</h2>
        
        <!-- الأصناف -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 flex justify-between items-center border">
            <div><h3 class="font-bold">كريب بانيه</h3><p class="text-orange-600 font-bold">65 ج.م</p></div>
            <button onclick="addToCart('كريب بانيه', 65)" class="bg-black text-white px-6 py-2 rounded-lg font-bold">+</button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 flex justify-between items-center border">
            <div><h3 class="font-bold">كريب استربس</h3><p class="text-orange-600 font-bold">80 ج.م</p></div>
            <button onclick="addToCart('كريب استربس', 80)" class="bg-black text-white px-6 py-2 rounded-lg font-bold">+</button>
        </div>
    </main>

    <!-- السلة -->
    <div id="cart-section" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t shadow-2xl z-50 hidden">
        <div id="cart-items" class="text-sm mb-4 font-bold text-gray-700"></div>
        <button onclick="sendToWhatsApp()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow-lg">إرسال الطلب واتساب 🛒</button>
    </div>

    <script>
        let cart = {};

        function addToCart(n, p) {
            if (!cart[n]) cart[n] = { p: p, q: 0 };
            cart[n].q++;
            document.getElementById('cart-section').classList.remove('hidden');
            renderCart();
        }

        function renderCart() {
            let html = "الطلبات:";
            Object.keys(cart).forEach(n => html += `<p>• ${n} (عدد: ${cart[n].q})</p>`);
            document.getElementById('cart-items').innerHTML = html;
        }

        function sendToWhatsApp() {
            let msg = "طلب جديد من مطعم مكانك:%0A";
            Object.keys(cart).forEach(n => {
                msg += `*${n}* - الكمية: ${cart[n].q} - السعر: ${cart[n].p * cart[n].q} ج.م%0A`;
            });
            window.open(`https://wa.me/201021477251?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
