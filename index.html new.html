<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e60023; --bg: #f8f8f8; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        
        /* صفحة الترحيب */
        #welcome-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .logo { width: 150px; height: 150px; border-radius: 50%; margin-bottom: 20px; object-fit: cover; border: 3px solid var(--primary); }
        .start-btn { background: var(--primary); color:white; padding:15px 40px; border-radius:30px; border:none; font-size:1.2rem; cursor:pointer; font-weight:bold; box-shadow: 0 4px 10px rgba(230,0,35,0.3); }

        /* شريط الأقسام العلوي */
        #nav-tabs { background: #fff; display: flex; padding: 15px; gap: 10px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { background: #f0f0f0; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; border: 1px solid #eee; }
        
        /* عناوين الأقسام */
        .category-title { font-weight: bold; font-size: 1.3rem; padding: 20px 15px 5px; color: #333; scroll-margin-top: 80px; }

        /* شبكة المنيو */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 15px; }
        .item-card { background: white; border-radius: 20px; padding: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.06); display: flex; flex-direction: column; }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; margin-bottom: 10px; background: #eee; }
        .item-title { font-weight: bold; font-size: 0.95rem; margin: 5px 0; flex-grow: 1; color: #111; }
        .price-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 5px 0; }
        .add-btn { background: var(--primary); color: white; border: none; width: 35px; height: 35px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* الشريط السفلي */
        #bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; font-size: 0.85rem; font-weight: bold; color: #555; }
        
        /* نافذة السلة (المودال) */
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 85%; border-radius: 20px; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <!-- صفحة الترحيب -->
    <div id="https://j.top4top.io/p_38460ugbt0.jpg">
        <!-- ضع رابط صورة اللوجو هنا بدلاً من الرابط الافتراضي -->
        <img src="https://via.placeholder.com/150/e60023/ffffff?text=مكانك" class="logo" alt="مطعم مكانك">
        <h1 style="margin-bottom: 5px;">مطعم مكانك</h1>
        <p style="color: #666; margin-bottom: 30px;">أطيب الأكلات في العريش</p>
        <button class="start-btn" onclick="document.getElementById('welcome-screen').style.display='none'">ابدأ الطلب 🍽️</button>
    </div>

    <!-- شريط الأقسام -->
    <div id="nav-tabs"></div>

    <!-- حاوية المنيو بالكامل -->
    <div id="menu-container">جاري تحميل المنيو...</div>

    <!-- الشريط السفلي -->
    <div id="bottom-nav">
        <span onclick="location.reload()" style="cursor:pointer;">🏠 الرئيسية</span>
        <span onclick="showModal()" id="cart-count" style="cursor:pointer; color:var(--primary);">🛒 السلة (0)</span>
        <span onclick="window.scrollTo({top: 0, behavior: 'smooth'});" style="cursor:pointer;">🍽️ المنيو</span>
        <span onclick="window.open('https://wa.me/201013740837', '_blank')" style="cursor:pointer;">📍 تتبع</span>
    </div>

    <!-- نافذة السلة -->
    <div id="cart-modal">
        <div class="modal-content">
            <h2 style="text-align:center; color: var(--primary);">سلة الطلبات</h2>
            <div id="cart-details" style="margin-bottom:20px; max-height: 250px; overflow-y: auto;"></div>
            <h3 style="text-align: left; margin-bottom: 15px;">الإجمالي: <span id="cart-total">0</span> ج.م</h3>
            <button onclick="sendToWhatsApp()" style="width:100%; background:#25D366; color:white; padding:15px; border:none; border-radius:10px; font-weight:bold; font-size:1.1rem; cursor:pointer;">إرسال الطلب عبر واتساب 💬</button>
            <button onclick="document.getElementById('cart-modal').style.display='none'" style="width:100%; background:#eee; color:#333; margin-top:10px; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1Ma5vOPN4iU321SfRkkg1KF3vumXnCpdLExw9e_zw764/export?format=csv";
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];

        async function loadMenu() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').filter(r => r.trim() !== "").slice(1);
                
                let categoriesData = {};

                // تجميع الأصناف داخل الأقسام الخاصة بها
                rows.forEach((row) => {
                    const cols = row.split(',');
                    const cat = cols[0], name = cols[1], price = cols[2], img = cols[4];
                    
                    if (cat && name) {
                        if (!categoriesData[cat]) categoriesData[cat] = [];
                        categoriesData[cat].push({ name: name, price: parseFloat(price) || 0, img: img });
                    }
                });

                let html = "";
                let tabsHtml = "";

                // بناء كود HTML لكل قسم والشبكة الخاصة به
                for (const cat in categoriesData) {
                    // بناء الأزرار العلوية
                    tabsHtml += `<button class="tab-btn" onclick="document.getElementById('cat-${cat}').scrollIntoView({behavior:'smooth'})">${cat}</button>`;
                    
                    // بناء عنوان القسم
                    html += `<div id="cat-${cat}" class="category-title">${cat}</div>`;
                    
                    // بناء شبكة الأصناف لهذا القسم
                    html += `<div class="menu-grid">`;
                    categoriesData[cat].forEach(item => {
                        html += `
                            <div class="item-card">
                                <img src="${item.img}" class="item-img" onerror="this.src='https://via.placeholder.com/150/eeeeee/cccccc?text=صورة'">
                                <div class="item-title">${item.name}</div>
                                <div class="price-row">
                                    <span style="font-weight:bold; color:var(--primary);">${item.price} ج.م</span>
                                    <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">+</button>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                document.getElementById('menu-container').innerHTML = html;
                document.getElementById('nav-tabs').innerHTML = tabsHtml;

            } catch (error) {
                document.getElementById('menu-container').innerHTML = "<p style='text-align:center; padding:20px;'>حدث خطأ في تحميل المنيو. يرجى التأكد من اتصال الإنترنت أو رابط جوجل شيت.</p>";
            }
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            localStorage.setItem('myCart', JSON.stringify(cart));
            updateCartCount();
        }

        function updateCartCount() {
            document.getElementById('cart-count').innerText = "🛒 السلة (" + cart.length + ")";
        }

        function showModal() {
            let detailsHtml = "";
            let total = 0;
            
            if (cart.length === 0) {
                detailsHtml = "<p style='text-align:center;'>السلة فارغة حالياً</p>";
            } else {
                cart.forEach((item, index) => {
                    detailsHtml += `
                        <div class="cart-item">
                            <span>${item.name}</span>
                            <span style="font-weight:bold;">${item.price} ج.م</span>
                        </div>
                    `;
                    total += item.price;
                });
            }
            
            document.getElementById('cart-details').innerHTML = detailsHtml;
            document.getElementById('cart-total').innerText = total;
            document.getElementById('cart-modal').style.display = 'block';
        }

        function sendToWhatsApp() {
            if (cart.length === 0) {
                alert("السلة فارغة!");
                return;
            }
            
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            let msg = "أهلاً مطعم مكانك، أريد طلب:%0A%0A";
            
            cart.forEach(item => {
                msg += `- ${item.name} (${item.price} ج.م)%0A`;
            });
            
            msg += `%0A*الإجمالي: ${total} ج.م*%0A%0Aالرجاء تأكيد الطلب.`;
            
            window.open('https://wa.me/201013740837?text=' + msg, '_blank');
            
            // تفريغ السلة بعد الطلب (اختياري)
            // cart = [];
            // localStorage.setItem('myCart', JSON.stringify(cart));
            // updateCartCount();
            // document.getElementById('cart-modal').style.display='none';
        }

        // تشغيل الدوال عند فتح الصفحة
        loadMenu();
        updateCartCount();
    </script>
</body>
</html>
