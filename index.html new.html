<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; margin: 0; padding-bottom: 80px; }
        header { background: #000; color: #ff9900; text-align: center; padding: 20px; font-weight: bold; }
        .item-card { background: #fff; padding: 15px; margin: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .add-btn { background: #ff9900; color: #000; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        
        /* زر السلة العائم */
        #floating-cart { position: fixed; bottom: 20px; right: 20px; left: 20px; background: #000; color: #fff; padding: 15px; border-radius: 50px; text-align: center; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* نافذة السلة */
        #cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; }
        .modal-content { background: white; margin: 20% auto; padding: 20px; width: 80%; border-radius: 15px; }
    </style>
</head>
<body>

    <header>مطعم مكانك</header>

    <div class="item-card">
        <div><strong>كريب بانيه</strong><br><small>65 ج.م</small></div>
        <button class="add-btn" onclick="addToCart('كريب بانيه', 65)">إضافة +</button>
    </div>

    <div id="floating-cart" onclick="showModal()">🛒 عرض السلة (0) - 0 ج.م</div>

    <div id="cart-modal">
        <div class="modal-content">
            <h2 style="text-align:center">طلبك</h2>
            <div id="cart-details"></div>
            <button onclick="sendToWhatsApp()" style="width:100%; background:green; color:white; padding:10px; border:none; border-radius:10px;">إتمام الطلب عبر واتساب</button>
            <button onclick="hideModal()" style="width:100%; background:#ccc; margin-top:10px; border:none; padding:10px; border-radius:10px;">إغلاق</button>
        </div>
    </div>

    <script>
        let cart = [];
        function addToCart(name, price) {
            cart.push({ name, price });
            updateFloatingBtn();
        }
        
        function updateFloatingBtn() {
            let total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('floating-cart').innerText = `🛒 عرض السلة (${cart.length}) - ${total} ج.م`;
        }

        function showModal() {
            document.getElementById('cart-modal').style.display = 'block';
            let html = cart.map(i => `<p>${i.name} - ${i.price} ج.م</p>`).join('');
            document.getElementById('cart-details').innerHTML = html;
        }

        function hideModal() { document.getElementById('cart-modal').style.display = 'none'; }

        function sendToWhatsApp() {
            let msg = "طلب جديد:%0A" + cart.map(i => i.name).join('%0A');
            window.open('https://wa.me/201021477251?text=' + msg, '_blank');
        }
    </script>
</body>
</html>
