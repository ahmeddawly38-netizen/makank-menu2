<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم مكانك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e60023; --bg: #f8f8f8; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        
        /* اللوجو الكبير في الأعلى */
        .header-logo { width: 100%; height: 200px; object-fit: cover; border-bottom: 5px solid var(--primary); }
        
        /* شريط الأقسام */
        #nav-tabs { background: #fff; display: flex; padding: 15px; gap: 10px; overflow-x: auto; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab-btn { background: #f0f0f0; padding: 8px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold; border: 1px solid #eee; }
        
        .category-title { font-weight: bold; font-size: 1.3rem; padding: 20px 15px 5px; color: #333; }
        
        /* شبكة المنيو */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px 15px; }
        .item-card { background: white; border-radius: 20px; padding: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .item-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .item-title { font-weight: bold; font-size: 0.95rem; margin: 5px 0; }
        .price-row { display: flex; justify-content: space-between; align-items: center; padding: 5px; }
        .add-btn { background: var(--primary); color: white; border: none; width: 35px; height: 35px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }

        /* الشريط السفلي */
        #bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; font-weight: bold; }
        
        /* النوافذ (Modals) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; }
        .modal-content { background: white; margin: 20% auto; padding: 20px; width: 80%; border-radius: 20px; }
    </style>
</head>
<body>

    <!-- اللوجو الكبير -->
    <img src="https://j.top4top.io/p_38460ugbt0.jpg" class="header-logo" alt="لوجو المطعم">

    <div id="nav-tabs"></div>
    <div id="menu-container"></div>

    <div id="bottom-nav">
        <span onclick="window.scrollTo({top: 0, behavior: 'smooth'})" style="cursor:pointer;">🏠 الرئيسية</span>
        <span onclick="showModal('cart-modal')" id="cart-count" style="cursor:pointer; color:var(--primary);">🛒 السلة</span>
        <span onclick="showModal('track-modal')" style="cursor:pointer;">📍 تتبع</span>
    </div>

    <!-- نافذة تتبع الطلب -->
    <div id="track-modal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center">تتبع طلبك</h2>
            <input type="text" id="order-id" placeholder="أدخل رقم الطلب أو هاتفك..." style="width:90%; padding:10px; margin-bottom:10px; border-radius:10px;">
            <button onclick="trackOrder()" style="width:100%; background:var(--primary); color:white; padding:10px; border:none; border-radius:10px;">استعلام</button>
        </div>
    </div>

    <!-- (كود الـ JavaScript كما هو سابقاً مع إضافة دالة trackOrder) -->
    <script>
        function showModal(id) { document.getElementById(id).style.display = 'block'; }
        
        function trackOrder() {
            let val = document.getElementById('order-id').value;
            if(val) {
                window.open('https://wa.me/201013740837?text=أريد الاستعلام عن طلب رقم: ' + val, '_blank');
            } else {
                alert("يرجى إدخال رقم الطلب");
            }
        }
        
        // ... باقي الدوال (loadMenu, addToCart, إلخ) كما كانت
    </script>
</body>
</html>
